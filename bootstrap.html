<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
  </head>

  <body>
    <img src="image.png" class="img-fluid" alt="Responsive image" />
    <h1>bootstrap Heading 1</h1>
    <p class="lead">This ia a lead paragraph for prominent text</p>

    <button type="button" class="btn btn-primary">Primary Button</button>
    <button type="button" class="btn btn-secondary">Secondary</button>
    <button type="button" class="btn btn-success">Success</button>
    <button type="button" class="btn btn-danger">Danger</button>
    <button type="button" class="btn btn-warning">Warning</button>
    <button type="button" class="btn btn-info">Info</button>
    <button type="button" class="btn btn-light">Light</button>
    <button type="button" class="btn btn-dark">Dark</button>
    <button type="button" class="btn btn-outline-secondary btn-sm">
      Small Outline Button
    </button>
    <button type="button" class="btn btn-primary">
      Notifications<span class="badge bg-danger">4+</span>
    </button>

    <br />
    <hr />
    <hr />
    <div class="container">
      <div class="row">
        <div class="col-12 col-md-6 col-lg-3">Column 1</div>
        <div class="col-12 col-md-6 col-lg-3">Column 2</div>
        <div class="col-12 col-md-6 col-lg-3">Column 3</div>
        <div class="col-12 col-md-6 col-lg-3">Column 4</div>
      </div>
    </div>
    <br />
    <hr />
    <hr />

    <form>
      <div class="mb-3">
        <label for="exampleInputEmail" class="form-label">Email address</label>
        <input
          type="email"
          class="form-control"
          id="exampleInputEmail"
          aria-describedby="emailHelp"
        />
        <div id="emailHelp" class="form-text">
          we'll never share your email with anyone else
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    <br />
    <hr />
    <hr />
  </body>
</html>
